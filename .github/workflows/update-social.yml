name: Update Social Media Counts

on:
  schedule:
    - cron: "0 6 1 * *"   # วันที่ 1 ของทุกเดือน เวลา 06:00 UTC
  workflow_dispatch:        # กดรัน manual ได้ตลอดเวลา

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch social counts
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_social.py

      - name: Commit updated data
        run: |
          git config user.name  "social-bot"
          git config user.email "bot@lifeofbike.github.io"
          git add data/social.json
          git diff --cached --quiet || git commit -m "chore: update social counts $(date -u +%Y-%m)"
          git push
